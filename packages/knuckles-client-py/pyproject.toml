[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "knuckles-client"
version = "0.1.1"
description = "Python SDK for the Knuckles identity service"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Garrett Sooter", email = "garrett.sooter@gmail.com" },
]
keywords = [
    "authentication",
    "auth",
    "identity",
    "jwt",
    "oauth",
    "webauthn",
    "passkey",
    "magic-link",
    "knuckles",
    "sdk",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP :: Session",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "requests>=2.31,<3",
    "PyJWT[crypto]>=2.8,<3",
]

[project.urls]
Homepage = "https://github.com/gsooter/knuckles"
Documentation = "https://gsooter.github.io/knuckles/"
Source = "https://github.com/gsooter/knuckles/tree/main/packages/knuckles-client-py"
Issues = "https://github.com/gsooter/knuckles/issues"
Changelog = "https://github.com/gsooter/knuckles/blob/main/packages/knuckles-client-py/CHANGELOG.md"

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<9",
    "responses>=0.25,<1",
    "mypy>=1.9,<2",
    "ruff==0.15.11",
    "black>=24.0,<25",
    "types-requests>=2.31,<3",
    "build>=1.2",
    "twine>=5.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
knuckles_client = ["py.typed"]

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "SIM", "TCH", "RUF"]

# Both packages use ``from __future__ import annotations`` so type
# annotations are strings at runtime. The TCH rules would still want
# these moved into ``TYPE_CHECKING`` blocks for symmetry, but the
# attribute-access uses (``responses.RequestsMock`` in test bodies,
# dataclass field types) need the runtime import.
[tool.ruff.lint.per-file-ignores]
"src/knuckles_client/client.py" = ["TC002"]
"src/knuckles_client/models.py" = ["TC003"]
"tests/**/*.py" = ["TC001", "TC002", "TC003"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"
