name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  service:
    name: Knuckles service (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Knuckles + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Black (format check)
        run: black --check knuckles tests

      - name: Ruff (lint)
        run: ruff check knuckles tests

      - name: Mypy (strict)
        run: mypy knuckles

      - name: Pytest (with 80% coverage gate)
        run: pytest --cov=knuckles --cov-report=term-missing --cov-fail-under=80

  sdk-python:
    name: Python SDK (knuckles-client)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/knuckles-client-py
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Black (format check)
        run: black --check src tests

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (strict)
        run: mypy src

      - name: Pytest
        run: pytest

  sdk-typescript:
    name: TypeScript SDK (@knuckles/client)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/knuckles-client-ts
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/knuckles-client-ts/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Pack preview (verifies what would publish)
        run: npm pack --dry-run
